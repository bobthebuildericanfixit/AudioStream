<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioStream Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-base: #000000;
            --bg-main: #121212;
            --bg-elevated: #242424;
            --text-base: #FFFFFF;
            --text-subdued: #B3B3B3;
            --accent: #1DB954;
            --dynamic-bg-light: rgba(30,120,80,0.4); 
            --dynamic-bg-dark: #1e7850;
        }

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; border: 2px solid var(--bg-main); }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base); color: var(--text-base);
            height: 100vh; display: grid;
            grid-template-columns: 72px 1fr; grid-template-rows: 1fr 90px;
            overflow: hidden; user-select: none;
        }

        /* Layout & Sidebar */
        .sidebar { grid-column: 1 / 2; grid-row: 1 / 2; display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 32px; height: 100%; }
        .sidebar-icon { width: 24px; height: 24px; fill: var(--text-subdued); cursor: pointer; transition: 0.2s; }
        .sidebar-icon:hover, .sidebar-icon.active { fill: var(--text-base); }
        .sidebar-profile { margin-top: auto; cursor: pointer; opacity: 0.6; transition: 0.2s; }
        .sidebar-profile:hover { opacity: 1; transform: scale(1.1); }
        .sidebar-profile.logged-in { fill: var(--accent); opacity: 1; }

        .main-container { grid-column: 2 / 3; grid-row: 1 / 2; background-color: var(--bg-main); border-radius: 8px 0 0 0; overflow: hidden; position: relative; }
        
        .top-nav { display: flex; justify-content: center; padding: 24px 32px; position: absolute; top: 0; left: 0; right: 0; z-index: 20; background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%); }
        .search-container { display: flex; align-items: center; background-color: var(--bg-elevated); border-radius: 500px; padding: 0 12px; width: 364px; }
        .search-icon { width: 20px; height: 20px; fill: var(--text-subdued); margin-right: 8px; }
        .search-bar { background: transparent; border: none; color: var(--text-base); width: 100%; height: 48px; font-size: 14px; outline: none; }

        .view-section { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; padding: 100px 32px 32px 32px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .view-section.active-view { opacity: 1; pointer-events: auto; }

        /* Home View */
        #home-view { background: linear-gradient(180deg, var(--dynamic-bg-light) 0%, rgba(18,18,18,1) 300px); }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero h1 { font-size: 56px; font-weight: 800; margin: 0 0 16px 0; }
        
        .track-list-header { display: grid; grid-template-columns: 48px 1fr; padding: 0 16px 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--text-subdued); font-size: 12px; font-weight: 500; text-transform: uppercase; margin-bottom: 16px; }
        .song-item { display: grid; grid-template-columns: 48px 1fr; align-items: center; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .song-item:hover { background-color: rgba(255,255,255,0.1); }
        .song-item.active-song .song-title { color: var(--accent); }
        .song-index { color: var(--text-subdued); font-size: 14px; text-align: center;}
        .song-title { font-weight: 500; font-size: 16px; margin-bottom: 4px; }
        .song-artist { font-size: 14px; color: var(--text-subdued); }

        /* Lyrics View */
        #lyrics-view { background-color: var(--dynamic-bg-dark); display: flex; flex-direction: column; align-items: center; }
        .lyrics-container { max-width: 800px; width: 100%; padding-top: 40px; padding-bottom: 300px; text-align: center;}
        .lyric-line { font-size: 32px; font-weight: 700; color: #000; opacity: 0.5; margin-bottom: 24px; transition: 0.3s ease; cursor: pointer; }
        .lyric-line:hover { opacity: 0.8; }
        .lyric-line.active-lyric { color: #fff; opacity: 1; font-size: 36px; }

        /* Auth Modal */
        #auth-modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(5px); display: none; justify-content: center; align-items: center; z-index: 999; }
        .auth-box { background: var(--bg-elevated); padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 16px; }
        .auth-input { background: #333; border: 1px solid transparent; padding: 12px; border-radius: 4px; color: white; outline: none; }
        .auth-btn { background: var(--accent); color: black; border: none; padding: 14px; border-radius: 500px; font-weight: bold; cursor: pointer; }
        .auth-toggle { text-align: center; font-size: 14px; color: var(--text-subdued); }
        .auth-close-btn { background: transparent; border: none; color: var(--text-subdued); cursor: pointer; }

        /* Player Bar */
        .player-bar { grid-column: 1 / 3; grid-row: 2 / 3; background-color: var(--bg-base); border-top: 1px solid #282828; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 60; }
        .track-info { width: 30%; min-width: 180px; display: flex; align-items: center; gap: 14px; }
        .album-art { width: 56px; height: 56px; border-radius: 4px; background-color: #282828; background-size: cover; background-position: center; }
        .np-text { display: flex; flex-direction: column; justify-content: center; }
        #np-title { font-size: 14px; font-weight: 600; }
        #np-artist { font-size: 12px; color: var(--text-subdued); }

        .player-center { width: 40%; max-width: 722px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-buttons { display: flex; align-items: center; gap: 24px; }
        .btn-icon { width: 16px; height: 16px; fill: var(--text-subdued); cursor: pointer; }
        .btn-icon:hover { fill: var(--text-base); }
        .play-btn { width: 32px; height: 32px; border-radius: 50%; background-color: var(--text-base); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .play-btn svg { width: 16px; height: 16px; fill: #000; }
        #pause-icon { display: none; }
        
        .progress-container { width: 100%; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-subdued); }
        .progress-bar-bg { flex: 1; height: 4px; background-color: #4D4D4D; border-radius: 2px; cursor: pointer; }
        .progress-bar-fill { height: 100%; background-color: var(--text-base); border-radius: 2px; width: 0%; pointer-events: none; }

        .volume-controls { width: 30%; display: flex; justify-content: flex-end; align-items: center; gap: 16px; }
        .volume-slider { width: 93px; }
        
        audio { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <svg class="sidebar-icon active" id="nav-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <div class="sidebar-profile" id="auth-trigger-btn" title="Log In">
            <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
        </div>
    </div>

    <div class="main-container">
        <div class="top-nav">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C5.91 14 3 11.09 3 9.5S5.91 5 9.5 5 16 7.91 16 9.5 11.09 14 9.5 14z"/></svg>
                <input type="text" id="search-input" class="search-bar" placeholder="Search...">
            </div>
        </div>

        <div id="home-view" class="view-section active-view">
            <div class="hero"><h1>Discover</h1></div>
            <div class="track-list-header"><div style="text-align:center">#</div><div>Title</div></div>
            <div id="song-list-container">Loading database...</div>
        </div>

        <div id="lyrics-view" class="view-section">
            <div class="lyrics-container" id="lyrics-container"><div class="lyric-line">Play a song to see lyrics.</div></div>
        </div>
    </div>

    <div id="auth-modal-overlay">
        <div class="auth-box">
            <h2 id="auth-title">Log In</h2>
            <p id="auth-error" style="color: #ff4444; font-size: 12px; display: none;"></p>
            <input type="email" id="auth-email" class="auth-input" placeholder="Email address">
            <input type="password" id="auth-password" class="auth-input" placeholder="Password">
            <button id="auth-submit-btn" class="auth-btn">Log In</button>
            <div class="auth-toggle">
                <span id="auth-toggle-text">Don't have an account? </span>
                <span id="auth-toggle-link" style="color: var(--accent); cursor: pointer; font-weight: bold;">Sign Up</span>
            </div>
            <button id="auth-close-btn" class="auth-close-btn">Cancel</button>
        </div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <div class="album-art" id="np-art"></div>
            <div class="np-text">
                <div id="np-title">No track selected</div>
                <div id="np-artist"></div> 
            </div>
        </div>
        
        <div class="player-center">
            <div class="control-buttons">
                <svg class="btn-icon" id="prev-btn" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                <div class="play-btn" id="play-pause-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
                <svg class="btn-icon" id="next-btn" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <div class="progress-bar-bg" id="progress-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="volume-controls">
            <svg class="btn-icon" id="lyrics-toggle-btn" viewBox="0 0 24 24" title="Toggle Lyrics"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01">
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // GLOBAL CRASH CATCHERS (Displays errors directly on screen)
        window.addEventListener("error", function (e) {
            document.getElementById('song-list-container').innerHTML = `<div style="color:#ff4444; padding:20px; font-size:14px; background:rgba(255,0,0,0.1); border-radius:8px;"><b>CRASH ERROR:</b> ${e.message}</div>`;
        });
        window.addEventListener("unhandledrejection", function (e) {
            document.getElementById('song-list-container').innerHTML = `<div style="color:#ff4444; padding:20px; font-size:14px; background:rgba(255,0,0,0.1); border-radius:8px;"><b>NETWORK/DB ERROR:</b> ${e.reason.message || e.reason}</div>`;
        });

        // Your specific Supabase Keys
        const supabaseUrl = 'https://xdebyjfkijaertthzjup.supabase.co';
        const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWJ5amZraWphZXJ0dGh6anVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTU4NjgsImV4cCI6MjA4ODczMTg2OH0.QPPyLb7SbY7ChzwDejlGC9dqqX0nEGiFHND402pqEDo';
        
        // Ensure Supabase loaded properly before initializing
        if (typeof window.supabase === 'undefined') {
            throw new Error("Supabase library failed to load from the internet. Check your connection or Adblocker.");
        }
        
        const supabase = window.supabase.createClient(supabaseUrl, anonKey);
        const audio = document.getElementById('audio-player');
        let songList = [];
        let currentSongIndex = -1;

        // AUTHENTICATION LOGIC
        let currentUser = null;
        let isSignUpMode = false;
        
        async function checkSession() {
            const { data: { session }, error } = await supabase.auth.getSession();
            if (error) console.error("Auth error:", error);
            if (session) {
                currentUser = session.user;
                document.getElementById('auth-trigger-btn').classList.add('logged-in');
            }
        }
        checkSession();

        document.getElementById('auth-trigger-btn').onclick = () => {
            if (currentUser) {
                supabase.auth.signOut().then(() => location.reload());
            } else {
                document.getElementById('auth-modal-overlay').style.display = 'flex';
            }
        };
        document.getElementById('auth-close-btn').onclick = () => document.getElementById('auth-modal-overlay').style.display = 'none';

        // DATABASE FETCH
        async function fetchSongs() {
            document.getElementById('song-list-container').innerHTML = "Connecting to database...";
            
            const { data, error } = await supabase.from('songs').select('*');
            
            if (error) {
                throw new Error(error.message + " (Check if your table is named EXACTLY 'songs' and RLS is allowed)");
            }
            
            if (!data || data.length === 0) {
                document.getElementById('song-list-container').innerHTML = '<div style="padding:16px; color:var(--text-subdued);">Database connected successfully, but no songs were found. Add a row to your "songs" table!</div>';
                return;
            }

            songList = data;
            renderList(songList);
        }

        function renderList(list) {
            const container = document.getElementById('song-list-container');
            container.innerHTML = ''; 
            list.forEach((song, index) => {
                const div = document.createElement('div');
                div.className = `song-item`;
                div.innerHTML = `
                    <div class="song-index">${index + 1}</div>
                    <div><div class="song-title">${song.title || "Unknown Title"}</div><div class="song-artist">${song.artist || "Unknown Artist"}</div></div>
                `;
                div.onclick = () => playSong(index);
                container.appendChild(div);
            });
        }

        // PLAYER LOGIC
        function playSong(index) {
            currentSongIndex = index;
            const song = songList[index];
            
            document.getElementById('np-title').innerText = song.title; 
            document.getElementById('np-artist').innerText = song.artist; 
            if (song.cover_url) document.getElementById('np-art').style.backgroundImage = `url('${song.cover_url}')`;

            audio.src = song.audio_url || "";
            audio.play().catch(e => console.error("Audio playback failed:", e));
            
            document.getElementById('play-icon').style.display = 'none';
            document.getElementById('pause-icon').style.display = 'block';
        }

        document.getElementById('play-pause-btn').onclick = () => {
            if (!audio.src) return;
            if (audio.paused) { audio.play(); document.getElementById('play-icon').style.display = 'none'; document.getElementById('pause-icon').style.display = 'block'; } 
            else { audio.pause(); document.getElementById('pause-icon').style.display = 'none'; document.getElementById('play-icon').style.display = 'block'; }
        };

        // UI TOGGLES
        const navHome = document.getElementById('nav-home');
        const lyricsToggleBtn = document.getElementById('lyrics-toggle-btn');
        const homeView = document.getElementById('home-view');
        const lyricsView = document.getElementById('lyrics-view');
        
        navHome.onclick = () => { lyricsView.classList.remove('active-view'); homeView.classList.add('active-view'); lyricsToggleBtn.classList.remove('active'); navHome.classList.add('active'); };
        lyricsToggleBtn.onclick = () => { homeView.classList.remove('active-view'); lyricsView.classList.add('active-view'); navHome.classList.remove('active'); lyricsToggleBtn.classList.add('active'); };

        // INITIALIZE
        fetchSongs();
    </script>
</body>
</html>
