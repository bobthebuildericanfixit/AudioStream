<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioStream</title>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h1 { margin-top: 0; font-size: 24px; }
        #now-playing {
            color: #1db954; 
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
        }
        audio {
            width: 100%;
            margin-bottom: 20px;
            outline: none;
        }
        .playlist {
            margin-top: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
        .song-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 15px;
        }
        .song-item:hover { background-color: #2a2a2a; }
        .song-artist {
            font-size: 12px;
            color: #b3b3b3;
            margin-top: 4px;
        }
        .error-text {
            color: #ff4444;
            background: #2a0000;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>AudioStream</h1>
        <div id="now-playing">Select a track from the playlist</div>
        
        <audio id="audio-player" controls>
            Your browser does not support the audio element.
        </audio>

        <h3>Your Playlist</h3>
        <div class="playlist" id="song-list">
            Loading your tracks...
        </div>
    </div>

    <script>
        // We use the raw REST API endpoint instead of the library
        const apiUrl = 'https://xdebyjfkijaertthzjup.supabase.co/rest/v1/songs?select=*';
        const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWJ5amZraWphZXJ0dGh6anVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTU4NjgsImV4cCI6MjA4ODczMTg2OH0.QPPyLb7SbY7ChzwDejlGC9dqqX0nEGiFHND402pqEDo';
        
        const audioPlayer = document.getElementById('audio-player');
        const nowPlayingText = document.getElementById('now-playing');
        const songListDiv = document.getElementById('song-list');

        async function fetchSongs() {
            try {
                // Fetching directly from the database URL
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: {
                        'apikey': anonKey,
                        'Authorization': `Bearer ${anonKey}`
                    }
                });

                // Check if Supabase yelled at us (like an RLS block)
                if (!response.ok) {
                    const errorData = await response.json();
                    songListDiv.innerHTML = `<div class="error-text"><strong>Database Blocked:</strong><br>${errorData.message || 'Access Denied'}<br><br><em>Did you turn off RLS for the songs table in Supabase?</em></div>`;
                    return;
                }

                // Convert the response to usable data
                const data = await response.json();

                // Check if it's empty
                if (data.length === 0) {
                    songListDiv.innerHTML = '<div class="error-text">No songs found. Add some rows to your Supabase table!</div>';
                    return;
                }

                // If it works, build the playlist!
                songListDiv.innerHTML = ''; 
                
                data.forEach(song => {
                    const songItem = document.createElement('div');
                    songItem.className = 'song-item';
                    songItem.innerHTML = `
                        <div><strong>${song.title}</strong></div>
                        <div class="song-artist">${song.artist}</div>
                    `;
                    
                    songItem.onclick = () => {
                        audioPlayer.src = song.audio_url;      
                        audioPlayer.play();                    
                        nowPlayingText.innerText = `Now Playing: ${song.title}`; 
                    };
                    
                    songListDiv.appendChild(songItem);
                });

            } catch (err) {
                // This catches network blocks or offline issues
                songListDiv.innerHTML = `<div class="error-text"><strong>Network Error:</strong> ${err.message}<br><br>Your school might be blocking the database URL completely.</div>`;
            }
        }

        fetchSongs();
    </script>
</body>
</html>
