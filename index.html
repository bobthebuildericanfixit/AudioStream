<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioStream Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>

    <style>
        :root {
            --bg-base: #000000;
            --bg-main: #121212;
            --bg-elevated: #181818;
            --text-base: #FFFFFF;
            --text-subdued: #B3B3B3;
            --accent: #1DB954;
            --accent-hover: #1ed760;
            
            /* Dynamic UI Variables */
            --dynamic-bg-light: rgba(30,120,80,0.4); 
            --dynamic-bg-dark: #1e7850;
        }

        * { box-sizing: border-box; }
        
        /* --- CUSTOM SCROLLBARS --- */
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; border: 2px solid var(--bg-main); }
        ::-webkit-scrollbar-thumb:hover { background: rgba(255, 255, 255, 0.5); }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-base);
            color: var(--text-base);
            height: 100vh;
            display: grid;
            grid-template-columns: 72px 1fr;
            grid-template-rows: 1fr 90px;
            overflow: hidden;
            user-select: none;
            -webkit-font-smoothing: antialiased;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            grid-column: 1 / 2; grid-row: 1 / 2;
            background-color: var(--bg-base);
            display: flex; flex-direction: column; align-items: center;
            padding: 24px 0; gap: 32px;
        }
        .sidebar-icon { width: 24px; height: 24px; fill: var(--text-subdued); cursor: pointer; transition: 0.2s; }
        .sidebar-icon:hover, .sidebar-icon.active { fill: var(--text-base); }

        /* --- MAIN VIEW CONTAINER --- */
        .main-container {
            grid-column: 2 / 3; grid-row: 1 / 2;
            background-color: var(--bg-main);
            border-radius: 8px 0 0 0; 
            overflow: hidden; 
            position: relative;
            display: flex; flex-direction: column;
        }

        /* --- TOP NAV --- */
        .top-nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px 32px; position: absolute; top: 0; left: 0; right: 0; z-index: 20;
            background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%);
        }
        .search-container {
            position: relative; display: flex; align-items: center;
            background-color: #242424; border-radius: 500px;
            padding: 0 12px; width: 364px; border: 1px solid transparent; transition: 0.3s; margin: 0 auto;
        }
        .search-container:hover, .search-container:focus-within { border-color: rgba(255,255,255,0.2); background-color: #2a2a2a; }
        .search-icon { width: 20px; height: 20px; fill: var(--text-subdued); margin-right: 8px; }
        .search-bar { background: transparent; border: none; color: var(--text-base); width: 100%; height: 48px; font-size: 14px; outline: none; }

        /* --- VIEWS --- */
        .view-section {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            overflow-y: auto; padding: 100px 32px 32px 32px;
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease, background 0.8s ease;
        }
        .view-section.active-view { opacity: 1; pointer-events: auto; }

        /* HOME VIEW - Dynamic Gradient */
        #home-view { background: linear-gradient(180deg, var(--dynamic-bg-light) 0%, rgba(18,18,18,1) 300px); }
        .hero { text-align: center; margin-bottom: 48px; }
        .hero h1 { font-size: 56px; font-weight: 800; margin: 0 0 16px 0; letter-spacing: -1px; }
        .section-title { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
        
        .track-list-header {
            display: grid; grid-template-columns: 48px 1fr;
            padding: 0 16px 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.1);
            color: var(--text-subdued); font-size: 12px; font-weight: 500; text-transform: uppercase; margin-bottom: 16px;
        }
        .song-item {
            display: grid; grid-template-columns: 48px 1fr; align-items: center;
            padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.2s;
        }
        .song-item:hover { background-color: rgba(255,255,255,0.1); }
        .song-item.active-song .song-title { color: var(--accent); }
        .song-index { color: var(--text-subdued); font-size: 14px; display: flex; justify-content: center; width: 16px; }
        
        /* AUDIO VISUALIZER (HOME PAGE) */
        .playing-visualizer { display: none; width: 14px; height: 14px; justify-content: space-between; align-items: flex-end; margin: 0 auto; }
        .song-item.active-song .playing-visualizer { display: flex; }
        .song-item.active-song .song-index { display: none; }
        .playing-visualizer span { width: 2px; background-color: var(--accent); animation: bounce 0.5s infinite alternate; border-radius: 1px; }
        .playing-visualizer span:nth-child(1) { animation-delay: 0s; }
        .playing-visualizer span:nth-child(2) { animation-delay: 0.2s; }
        .playing-visualizer span:nth-child(3) { animation-delay: 0.4s; }
        .playing-visualizer span:nth-child(4) { animation-delay: 0.1s; }
        .playing-visualizer.paused span { animation: none !important; height: 2px !important; }

        @keyframes bounce { 0% { height: 2px; } 100% { height: 14px; } }

        .song-title { font-weight: 500; font-size: 16px; color: var(--text-base); margin-bottom: 4px; }
        .song-artist { font-size: 14px; color: var(--text-subdued); }

        /* LYRICS VIEW - Dynamic Solid Background */
        #lyrics-view { background-color: var(--dynamic-bg-dark); transition: background-color 0.8s ease; display: flex; flex-direction: column; align-items: center; }
        .lyrics-container { max-width: 800px; width: 100%; padding-top: 40px; padding-bottom: 300px; }
        .lyric-line { font-size: 32px; font-weight: 700; color: #000000; opacity: 0.5; margin-bottom: 24px; transition: 0.3s ease; cursor: pointer; }
        .lyric-line:hover { opacity: 0.8; }
        .lyric-line.active-lyric { color: #ffffff; opacity: 1; font-size: 36px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
        .lyric-section { font-size: 16px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px; margin-top: 48px; margin-bottom: 16px; font-weight: 800; opacity: 1; cursor: default; }

        /* --- PLAYER BAR --- */
        .player-bar {
            grid-column: 1 / 3; grid-row: 2 / 3;
            background-color: var(--bg-base); border-top: 1px solid #282828;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 16px; z-index: 30;
        }
        .track-info { width: 30%; min-width: 180px; display: flex; align-items: center; gap: 14px; }
        .album-art { width: 56px; height: 56px; border-radius: 4px; background-color: #282828; background-size: cover; background-position: center; transition: 0.3s ease;}
        .np-text { display: flex; flex-direction: column; justify-content: center; }
        #np-title { font-size: 14px; font-weight: 600; }
        #np-artist { font-size: 12px; color: var(--text-subdued); }

        .player-center { width: 40%; max-width: 722px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-buttons { display: flex; align-items: center; gap: 24px; }
        .btn-icon { width: 16px; height: 16px; fill: var(--text-subdued); cursor: pointer; transition: 0.2s; }
        .btn-icon:hover { fill: var(--text-base); }
        .btn-icon.active { fill: var(--accent); position: relative;}
        /* Add a tiny dot under active shuffle/repeat buttons like Spotify */
        .btn-icon.active::after { content: ''; position: absolute; bottom: -6px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; background-color: var(--accent); border-radius: 50%; }

        .play-btn {
            width: 32px; height: 32px; border-radius: 50%; background-color: var(--text-base);
            display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.06); background-color: #fff; }
        .play-btn svg { width: 16px; height: 16px; fill: #000; margin-left: 2px;}
        #pause-icon { margin-left: 0; }
        
        .progress-container { width: 100%; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-subdued); }
        .progress-bar-bg { flex: 1; height: 4px; background-color: #4D4D4D; border-radius: 2px; cursor: pointer; position: relative; }
        .progress-bar-fill { height: 100%; background-color: var(--text-base); border-radius: 2px; width: 0%; pointer-events: none; }

        .volume-controls { width: 30%; min-width: 180px; display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
        .volume-slider { -webkit-appearance: none; width: 93px; height: 4px; background: #4D4D4D; border-radius: 2px; outline: none; cursor: pointer; }
        .volume-slider::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #fff; cursor: pointer; opacity: 0; }
        .volume-slider:hover::-webkit-slider-thumb { opacity: 1; }

        audio { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <svg class="sidebar-icon active" id="nav-home" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
    </div>

    <div class="main-container">
        
        <div class="top-nav">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C5.91 14 3 11.09 3 9.5S5.91 5 9.5 5 16 7.91 16 9.5 11.09 14 9.5 14z"/></svg>
                <input type="text" id="search-input" class="search-bar" placeholder="Search for a song...">
            </div>
        </div>

        <div id="home-view" class="view-section active-view">
            <div class="hero"><h1>Discover</h1></div>
            <div class="section-title">Your Tracks</div>
            <div class="track-list-header">
                <div style="text-align: center;">#</div>
                <div>Title</div>
            </div>
            <div id="song-list-container">
                <div style="color: var(--text-subdued); padding: 16px;">Loading database...</div>
            </div>
        </div>

        <div id="lyrics-view" class="view-section">
            <div class="lyrics-container" id="lyrics-container">
                <div class="lyric-line" style="text-align:center;">Play a song to see lyrics.</div>
            </div>
        </div>

    </div>

    <div class="player-bar">
        <div class="track-info">
            <div class="album-art" id="np-art"></div>
            <div class="np-text">
                <div id="np-title">No track selected</div>
                <div id="np-artist"></div>
            </div>
        </div>
        
        <div class="player-center">
            <div class="control-buttons">
                <svg class="btn-icon" id="shuffle-btn" viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg>
                
                <svg class="btn-icon" id="prev-btn" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                
                <div class="play-btn" id="play-pause-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display: none;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
                
                <svg class="btn-icon" id="next-btn" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
                
                <svg class="btn-icon" id="repeat-btn" viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            </div>
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <div class="progress-bar-bg" id="progress-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="volume-controls">
            <svg class="btn-icon" id="lyrics-toggle-btn" viewBox="0 0 24 24"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/></svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01">
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const apiUrl = 'https://xdebyjfkijaertthzjup.supabase.co/rest/v1/songs?select=*';
        const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWJ5amZraWphZXJ0dGh6anVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTU4NjgsImV4cCI6MjA4ODczMTg2OH0.QPPyLb7SbY7ChzwDejlGC9dqqX0nEGiFHND402pqEDo';
        
        let songList = [];
        let currentSongIndex = -1;
        let currentLyricsData = null;
        let isShuffle = false;
        let isRepeat = false;

        const audio = document.getElementById('audio-player');
        const songListContainer = document.getElementById('song-list-container');
        const searchInput = document.getElementById('search-input');
        const lyricsContainer = document.getElementById('lyrics-container');
        const lyricsView = document.getElementById('lyrics-view');
        
        audio.volume = localStorage.getItem('audioStreamVol') || 0.5;
        document.getElementById('volume-slider').value = audio.volume;

        // Initialize ColorThief
        const colorThief = new ColorThief();

        // --- 1. FETCH ---
        async function fetchSongs() {
            try {
                const res = await fetch(apiUrl, { headers: { 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` } });
                if (!res.ok) throw new Error('Failed to load DB');
                songList = await res.json();
                renderList(songList);
            } catch (err) { 
                console.error(err); 
                songListContainer.innerHTML = '<div style="color:#e91429; padding:16px;">Error connecting to DB.</div>';
            }
        }

        function renderList(listToRender) {
            if (listToRender.length === 0) {
                songListContainer.innerHTML = '<div style="color:var(--text-subdued); padding:16px;">No tracks found.</div>';
                return;
            }
            songListContainer.innerHTML = ''; 
            listToRender.forEach((song) => {
                const absoluteIndex = songList.findIndex(s => s.id === song.id);
                const div = document.createElement('div');
                div.className = `song-item ${absoluteIndex === currentSongIndex ? 'active-song' : ''}`;
                div.id = `song-row-${absoluteIndex}`;
                
                div.innerHTML = `
                    <div style="position: relative; width: 16px; margin: 0 auto; display: flex; justify-content: center;">
                        <span class="song-index">${absoluteIndex + 1}</span>
                        <div class="playing-visualizer" id="viz-${absoluteIndex}">
                            <span></span><span></span><span></span><span></span>
                        </div>
                    </div>
                    <div>
                        <div class="song-title">${song.title}</div>
                        <div class="song-artist">${song.artist}</div>
                    </div>
                `;
                div.onclick = () => playSong(absoluteIndex);
                songListContainer.appendChild(div);
            });
            updateVisualizerState();
        }

        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            renderList(songList.filter(s => s.title.toLowerCase().includes(term) || s.artist.toLowerCase().includes(term)));
        });

        // --- 2. PLAYBACK, CHAMELEON UI & API ---
        async function playSong(index) {
            if (index < 0 || index >= songList.length) return;
            currentSongIndex = index;
            const song = songList[currentSongIndex];

            // UI Updates
            document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active-song'));
            const row = document.getElementById(`song-row-${index}`);
            if(row) row.classList.add('active-song');
            
            document.getElementById('np-title').innerText = song.title; 
            document.getElementById('np-artist').innerText = song.artist; 
            
            if (song.cover_url) {
                document.getElementById('np-art').style.backgroundImage = `url('${song.cover_url}')`;
                extractDominantColor(song.cover_url);
            } else {
                document.getElementById('np-art').style.backgroundImage = 'none';
                resetDominantColor();
            }

            // Audio Updates
            audio.src = song.audio_url;      
            audio.play();                    
            document.getElementById('play-icon').style.display = 'none';
            document.getElementById('pause-icon').style.display = 'block';
            updateVisualizerState();

            // Lyrics API
            lyricsContainer.innerHTML = '<div class="lyric-line" style="text-align:center;">Searching for lyrics...</div>';
            currentLyricsData = null;
            
            try {
                const lrcRes = await fetch(`https://lrclib.net/api/get?track_name=${encodeURIComponent(song.title)}&artist_name=${encodeURIComponent(song.artist)}`);
                if (!lrcRes.ok) throw new Error('Not found');
                const lrcData = await lrcRes.json();
                
                if (lrcData && lrcData.syncedLyrics) {
                    const parsedLrc = parseLRC(lrcData.syncedLyrics);
                    renderLyricsEngine(parsedLrc);
                } else if (lrcData && lrcData.plainLyrics) {
                    lyricsContainer.innerHTML = `<div class="lyric-line" style="font-size: 24px; white-space: pre-wrap; opacity: 1;">${lrcData.plainLyrics}</div>`;
                } else {
                    lyricsContainer.innerHTML = '<div class="lyric-line" style="text-align:center;">No lyrics found for this track.</div>';
                }
            } catch(e) {
                lyricsContainer.innerHTML = '<div class="lyric-line" style="text-align:center;">No lyrics found for this track.</div>';
            }
        }

        // --- 3. CHAMELEON UI COLOR EXTRACTION ---
        function extractDominantColor(imageUrl) {
            const img = new Image();
            img.crossOrigin = 'Anonymous'; // Crucial for CORS
            img.src = imageUrl;
            img.onload = () => {
                try {
                    const color = colorThief.getColor(img);
                    // Light version for the home page gradient fade
                    document.documentElement.style.setProperty('--dynamic-bg-light', `rgba(${color[0]}, ${color[1]}, ${color[2]}, 0.4)`);
                    // Darker/Solid version for the lyrics background
                    document.documentElement.style.setProperty('--dynamic-bg-dark', `rgb(${Math.max(0, color[0]-40)}, ${Math.max(0, color[1]-40)}, ${Math.max(0, color[2]-40)})`);
                } catch (e) {
                    console.warn("CORS blocked ColorThief, falling back to default theme.");
                    resetDominantColor();
                }
            };
            img.onerror = () => resetDominantColor();
        }

        function resetDominantColor() {
            document.documentElement.style.setProperty('--dynamic-bg-light', 'rgba(30,120,80,0.4)');
            document.documentElement.style.setProperty('--dynamic-bg-dark', '#1e7850');
        }

        // --- 4. LRC PARSER ---
        function parseLRC(lrcString) {
            const lines = lrcString.split('\n');
            const parsed = [];
            lines.forEach(line => {
                const match = line.match(/\[(\d+):(\d+\.\d+)\](.*)/);
                if (match) {
                    const minutes = parseInt(match[1]);
                    const seconds = parseFloat(match[2]);
                    const text = match[3].trim();
                    if (text) parsed.push({ time: (minutes * 60) + seconds, text: text });
                }
            });
            return parsed;
        }

        function renderLyricsEngine(lyricsArray) {
            lyricsContainer.innerHTML = '';
            currentLyricsData = lyricsArray;
            currentLyricsData.forEach((lineData, i) => {
                const p = document.createElement('div');
                const isSectionHeader = /^\[.*\]$/.test(lineData.text) || /^\(?(verse|chorus|hook|bridge|intro|outro).*\)?$/i.test(lineData.text.trim());
                if (isSectionHeader) {
                    p.className = 'lyric-section';
                    p.innerText = lineData.text.replace(/\[|\]|\(|\)/g, '');
                } else {
                    p.className = 'lyric-line';
                    p.id = `lyric-${i}`;
                    p.innerText = lineData.text;
                    p.onclick = () => { audio.currentTime = lineData.time; };
                }
                lyricsContainer.appendChild(p);
            });
        }

        // --- 5. VIEW SWAPPING ---
        const navHome = document.getElementById('nav-home');
        const lyricsToggleBtn = document.getElementById('lyrics-toggle-btn');
        const homeView = document.getElementById('home-view');

        navHome.onclick = () => {
            lyricsView.classList.remove('active-view');
            homeView.classList.add('active-view');
            lyricsToggleBtn.classList.remove('active');
            navHome.classList.add('active');
        };

        lyricsToggleBtn.onclick = () => {
            homeView.classList.remove('active-view');
            lyricsView.classList.add('active-view');
            navHome.classList.remove('active');
            lyricsToggleBtn.classList.add('active');
        };

        // --- 6. PROGRESS, CONTROLS & SHORTCUTS ---
        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            document.getElementById('progress-fill').style.width = percent + '%';
            document.getElementById('time-current').innerText = formatTime(audio.currentTime);

            if (currentLyricsData && lyricsView.classList.contains('active-view')) {
                const time = audio.currentTime;
                let activeLyricIndex = -1;
                for (let i = 0; i < currentLyricsData.length; i++) {
                    if (time >= currentLyricsData[i].time - 0.3) activeLyricIndex = i;
                    else break; 
                }

                if (activeLyricIndex !== -1) {
                    document.querySelectorAll('.lyric-line').forEach(el => el.classList.remove('active-lyric'));
                    const activeEl = document.getElementById(`lyric-${activeLyricIndex}`);
                    if (activeEl && !activeEl.classList.contains('active-lyric')) {
                        activeEl.classList.add('active-lyric');
                        const containerHeight = lyricsView.clientHeight;
                        const elementOffset = activeEl.offsetTop;
                        lyricsView.scrollTo({ top: elementOffset - (containerHeight / 2) + 100, behavior: 'smooth' });
                    }
                }
            }
        };

        function togglePlay() {
            if (!audio.src) return; 
            if (audio.paused) {
                audio.play();
                document.getElementById('play-icon').style.display = 'none';
                document.getElementById('pause-icon').style.display = 'block';
            } else {
                audio.pause();
                document.getElementById('pause-icon').style.display = 'none';
                document.getElementById('play-icon').style.display = 'block';
            }
            updateVisualizerState();
        }

        document.getElementById('play-pause-btn').onclick = togglePlay;

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && e.target.tagName !== 'INPUT') {
                e.preventDefault(); 
                togglePlay();
            }
        });

        function updateVisualizerState() {
            document.querySelectorAll('.playing-visualizer').forEach(viz => {
                if (audio.paused) viz.classList.add('paused');
                else viz.classList.remove('paused');
            });
        }
        audio.onplay = updateVisualizerState;
        audio.onpause = updateVisualizerState;

        // --- 7. SHUFFLE & REPEAT LOGIC ---
        const shuffleBtn = document.getElementById('shuffle-btn');
        const repeatBtn = document.getElementById('repeat-btn');

        shuffleBtn.onclick = () => {
            isShuffle = !isShuffle;
            shuffleBtn.classList.toggle('active');
        };

        repeatBtn.onclick = () => {
            isRepeat = !isRepeat;
            repeatBtn.classList.toggle('active');
        };

        function playNext() {
            if (songList.length === 0) return;
            
            // If Repeat is active, just loop the current song
            if (isRepeat) {
                audio.currentTime = 0;
                audio.play();
                return;
            }

            let nextIndex = currentSongIndex + 1;
            
            // If Shuffle is active, pick a random song that isn't the current one
            if (isShuffle && songList.length > 1) {
                do {
                    nextIndex = Math.floor(Math.random() * songList.length);
                } while (nextIndex === currentSongIndex);
            } else if (nextIndex >= songList.length) {
                // Loop back to start if not shuffling and hit the end
                nextIndex = 0; 
            }
            
            playSong(nextIndex);
        }

        document.getElementById('next-btn').onclick = playNext;
        audio.onended = playNext; // Automatically trigger next track logic when song finishes

        document.getElementById('prev-btn').onclick = () => {
            if (songList.length === 0) return;
            // If we are more than 3 seconds in, just restart the song like Spotify does
            if (audio.currentTime > 3) { 
                audio.currentTime = 0; 
            } else { 
                // Otherwise, go to previous track (bypassing shuffle logic for predictability)
                playSong((currentSongIndex - 1) < 0 ? songList.length - 1 : currentSongIndex - 1); 
            }
        };

        document.getElementById('progress-bg').onclick = (e) => {
            if (!audio.duration) return;
            const rect = document.getElementById('progress-bg').getBoundingClientRect();
            audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
        };

        document.getElementById('volume-slider').addEventListener('input', (e) => {
            audio.volume = e.target.value;
            localStorage.setItem('audioStreamVol', e.target.value);
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            let mins = Math.floor(seconds / 60);
            let secs = Math.floor(seconds % 60);
            return mins + ":" + (secs < 10 ? "0" + secs : secs);
        }

        audio.onloadedmetadata = () => { document.getElementById('time-total').innerText = formatTime(audio.duration); };

        fetchSongs();
    </script>
</body>
</html>
