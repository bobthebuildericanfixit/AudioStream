<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioStream</title>
    
    <style>
        :root {
            --bg-main: #121316;
            --bg-sidebar: #0a0b0d;
            --bg-player: #121316;
            --bg-card: #1e1f24;
            --accent-green: #1ed760;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: grid;
            grid-template-columns: 70px 1fr;
            grid-template-rows: 1fr 90px;
            overflow: hidden;
            user-select: none;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background-color: var(--bg-sidebar);
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-sub);
            cursor: pointer;
            transition: 0.2s;
        }
        .sidebar-icon:hover { fill: var(--text-main); }
        .sidebar-icon.active { fill: var(--accent-green); }

        /* --- MAIN CONTENT --- */
        .main-view {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            overflow-y: auto;
            position: relative;
            background: radial-gradient(circle at 50% -20%, rgba(30, 100, 70, 0.4) 0%, var(--bg-main) 60%);
            padding: 20px 40px;
        }

        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 15px;
            width: 18px;
            height: 18px;
            fill: var(--text-sub);
        }
        .search-bar {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            padding: 10px 20px 10px 40px;
            border-radius: 20px;
            color: white;
            width: 300px;
            outline: none;
            transition: 0.2s;
        }
        .search-bar:focus {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(255, 255, 255, 0.1);
        }

        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 42px;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-sub);
        }
        .sparkle-icon {
            width: 14px;
            height: 14px;
            fill: var(--text-sub);
        }

        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        
        /* Database Tracks Section */
        .db-tracks {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .song-item {
            display: grid;
            grid-template-columns: 40px 1fr;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .song-item.active {
            background-color: rgba(255,255,255,0.1);
        }
        .song-item.active .song-title {
            color: var(--accent-green);
        }
        .song-item:hover { background-color: rgba(255,255,255,0.05); }
        .song-title { font-weight: bold; font-size: 15px; color: var(--text-main); }
        .song-artist { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
        .play-indicator { fill: var(--accent-green); opacity: 0; width: 16px; height: 16px; }
        .song-item:hover .play-indicator, .song-item.active .play-indicator { opacity: 1; }

        /* --- BOTTOM PLAYER --- */
        .player-bar {
            grid-column: 1 / 3;
            grid-row: 2 / 3;
            background-color: var(--bg-player);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            z-index: 10;
        }
        
        .track-info {
            width: 30%;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .album-art {
            width: 56px;
            height: 56px;
            background-color: #282828;
            border-radius: 6px;
            background-size: cover;
            background-position: center;
        }
        #np-title { font-size: 14px; font-weight: bold; margin-bottom: 4px; }
        #np-artist { font-size: 12px; color: var(--text-sub); }

        .player-controls {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .control-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .btn-icon {
            width: 16px; height: 16px;
            fill: var(--text-sub);
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-icon:hover { fill: var(--text-main); }
        
        .play-btn {
            width: 32px; height: 32px;
            background-color: var(--text-main);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
            transition: 0.2s;
        }
        .play-btn:hover { transform: scale(1.05); }
        .play-btn svg { width: 16px; height: 16px; fill: black; }
        #play-icon { margin-left: 2px; }
        
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-sub);
        }
        .progress-bar-bg {
            flex: 1;
            height: 4px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
            transition: height 0.1s;
        }
        .progress-bar-bg:hover { height: 6px; }
        .progress-bar-bg:hover .progress-bar-fill { background-color: #1ed760; }
        .progress-bar-fill {
            height: 100%;
            background-color: var(--text-main);
            border-radius: 2px;
            width: 0%;
            pointer-events: none;
        }

        /* Volume Controls */
        .volume-controls { 
            width: 30%; 
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 10px;
        }
        .volume-slider {
            -webkit-appearance: none;
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--text-main);
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .volume-slider:hover::-webkit-slider-thumb { opacity: 1; }
        .volume-slider:hover { background: #1ed760; }

        audio { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <svg class="sidebar-icon active" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#1ed760"/><path d="M8 12a4 4 0 0 1 8 0" stroke="black" stroke-width="2" fill="none"/></svg>
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
    </div>

    <div class="main-view">
        <div class="top-nav">
            <div style="font-size: 12px; color: var(--text-sub);">Artists > Top 2024</div>
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C5.91 14 3 11.09 3 9.5S5.91 5 9.5 5 16 7.91 16 9.5 11.09 14 9.5 14z"/></svg>
                <input type="text" class="search-bar" placeholder="What do you want to listen to?">
            </div>
            <div style="width:30px; height:30px; background:#444; border-radius:50%;"></div>
        </div>

        <div class="hero">
            <h1>Discover</h1>
            <div class="hero-badge">
                <svg class="sparkle-icon" viewBox="0 0 24 24"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"/></svg>
                made for you
            </div>
        </div>

        <div class="section-title">Your Tracks</div>
        <div class="db-tracks" id="song-list">
            <div style="color: var(--text-sub);">Loading database...</div>
        </div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <div class="album-art" id="np-art"></div>
            <div>
                <div id="np-title">No track selected</div>
                <div id="np-artist">-</div>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="control-buttons">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                
                <div class="play-btn" id="play-pause-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display: none; margin-left: 0;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
                
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <div class="progress-bar-bg" id="progress-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="volume-controls">
            <svg class="btn-icon" viewBox="0 0 24 24" style="width: 20px; height: 20px;"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01">
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const apiUrl = 'https://xdebyjfkijaertthzjup.supabase.co/rest/v1/songs?select=*';
        const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWJ5amZraWphZXJ0dGh6anVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTU4NjgsImV4cCI6MjA4ODczMTg2OH0.QPPyLb7SbY7ChzwDejlGC9dqqX0nEGiFHND402pqEDo';
        
        const audio = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressBg = document.getElementById('progress-bg');
        const progressFill = document.getElementById('progress-fill');
        const timeCurrent = document.getElementById('time-current');
        const timeTotal = document.getElementById('time-total');
        const npTitle = document.getElementById('np-title');
        const npArtist = document.getElementById('np-artist');
        const npArt = document.getElementById('np-art');
        const volSlider = document.getElementById('volume-slider');

        // --- 1. VOLUME PERSISTENCE ---
        // Grab saved volume from browser storage, default to 50% if none exists
        let savedVol = localStorage.getItem('audioStreamVol') || 0.5;
        audio.volume = savedVol;
        volSlider.value = savedVol;

        volSlider.addEventListener('input', (e) => {
            const newVol = e.target.value;
            audio.volume = newVol;
            localStorage.setItem('audioStreamVol', newVol); // Save it forever
        });

        // --- 2. FETCH & LOAD SONGS ---
        async function fetchSongs() {
            try {
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` }
                });

                if (!response.ok) return;

                const data = await response.json();
                const songListDiv = document.getElementById('song-list');
                
                if (data.length === 0) {
                    songListDiv.innerHTML = '<div style="color:#ff4444;">No tracks found.</div>';
                    return;
                }

                songListDiv.innerHTML = ''; 

                data.forEach(song => {
                    const songItem = document.createElement('div');
                    songItem.className = 'song-item';
                    songItem.innerHTML = `
                        <svg class="play-indicator" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <div>
                            <div class="song-title">${song.title}</div>
                            <div class="song-artist">${song.artist}</div>
                        </div>
                    `;
                    
                    songItem.onclick = () => {
                        // Remove active class from all, add to this one
                        document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active'));
                        songItem.classList.add('active');

                        audio.src = song.audio_url;      
                        audio.play();                    
                        
                        npTitle.innerText = song.title; 
                        npArtist.innerText = song.artist; 
                        
                        // Load cover art if it exists in DB, otherwise stay blank
                        if(song.cover_url) {
                            npArt.style.backgroundImage = \`url('\${song.cover_url}')\`;
                        } else {
                            npArt.style.backgroundImage = 'none';
                        }
                        
                        playIcon.style.display = 'none';
                        pauseIcon.style.display = 'block';
                    };
                    
                    songListDiv.appendChild(songItem);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // --- 3. PLAY/PAUSE LOGIC ---
        playPauseBtn.onclick = () => {
            if (!audio.src) return; 
            
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                pauseIcon.style.display = 'none';
                playIcon.style.display = 'block';
            }
        };

        // Format time helper (e.g., 65s -> "1:05")
        function formatTime(seconds) {
            let mins = Math.floor(seconds / 60);
            let secs = Math.floor(seconds % 60);
            if (secs < 10) secs = "0" + secs;
            return mins + ":" + secs;
        }

        // --- 4. PROGRESS BAR & SEEKING ---
        // Update total time when a song fully loads its metadata
        audio.onloadedmetadata = () => {
            timeTotal.innerText = formatTime(audio.duration);
        };

        // Update progress bar as song plays
        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';
            timeCurrent.innerText = formatTime(audio.currentTime);
        };

        // Make progress bar clickable to skip forward/backward
        progressBg.addEventListener('click', (e) => {
            if (!audio.duration) return;
            const rect = progressBg.getBoundingClientRect();
            const clickX = e.clientX - rect.left;
            const width = rect.width;
            const clickPercent = clickX / width;
            audio.currentTime = clickPercent * audio.duration;
        });

        fetchSongs();
    </script>
</body>
</html>
