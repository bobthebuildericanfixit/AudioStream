<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioStream Pro</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.0/color-thief.umd.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg-base: #000000;
            --bg-main: #121212;
            --bg-elevated: #242424;
            --text-base: #FFFFFF;
            --text-subdued: #B3B3B3;
            --accent: #1DB954;
            --dynamic-bg-light: rgba(30,120,80,0.4); 
            --dynamic-bg-dark: #1e7850;
        }

        * { box-sizing: border-box; }
        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.3); border-radius: 10px; border: 2px solid var(--bg-main); }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-base); color: var(--text-base);
            height: 100vh; display: grid;
            grid-template-columns: 72px 1fr 0px;
            grid-template-rows: 1fr 90px;
            overflow: hidden; user-select: none; transition: 0.4s ease;
        }

        /* --- Mini Player Mode --- */
        body.mini-player-mode { grid-template-rows: 1fr 0px; }
        body.mini-player-mode .player-bar { 
            position: fixed; bottom: 20px; right: 20px; width: 350px; height: 120px; 
            border-radius: 16px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            flex-direction: column; padding: 16px; z-index: 100;
            background: var(--bg-elevated); border: 1px solid #333;
        }
        body.mini-player-mode .volume-controls, body.mini-player-mode .track-info { width: 100%; justify-content: center; }
        body.mini-player-mode .player-center { width: 100%; margin-top: 8px;}
        body.mini-player-mode .np-text { align-items: center; text-align: center; }

        /* --- Queue Sidebar --- */
        body.queue-open { grid-template-columns: 72px 1fr 300px; }
        .queue-sidebar { 
            grid-column: 3 / 4; grid-row: 1 / 2; background: var(--bg-elevated); 
            border-left: 1px solid #282828; padding: 24px 16px; overflow-y: auto; 
            display: flex; flex-direction: column; gap: 16px;
        }
        .queue-header { font-size: 18px; font-weight: bold; margin-bottom: 16px; }
        .queue-item { display: flex; align-items: center; gap: 12px; font-size: 14px; opacity: 0.7; }
        .queue-item img { width: 40px; height: 40px; border-radius: 4px; background: #333; }
        .queue-item-info { display: flex; flex-direction: column; }
        .queue-item-title { color: #fff; font-weight: 500; }

        .sidebar { grid-column: 1 / 2; grid-row: 1 / 2; display: flex; flex-direction: column; align-items: center; padding: 24px 0; gap: 32px; height: 100%; }
        .sidebar-icon { width: 24px; height: 24px; fill: var(--text-subdued); cursor: pointer; transition: 0.2s; }
        .sidebar-icon:hover, .sidebar-icon.active { fill: var(--text-base); }

        .main-container { grid-column: 2 / 3; grid-row: 1 / 2; background-color: var(--bg-main); border-radius: 8px 0 0 0; overflow: hidden; position: relative; transition: 0.4s ease;}

        .top-nav { display: flex; justify-content: space-between; align-items: center; padding: 24px 32px; position: absolute; top: 0; left: 0; right: 0; z-index: 20; background: linear-gradient(180deg, rgba(0,0,0,0.7) 0%, transparent 100%); }
        .search-container { display: flex; align-items: center; background-color: var(--bg-elevated); border-radius: 500px; padding: 0 12px; width: 364px; }
        .search-icon { width: 20px; height: 20px; fill: var(--text-subdued); margin-right: 8px; }
        .search-bar { background: transparent; border: none; color: var(--text-base); width: 100%; height: 48px; outline: none; }
        .view-toggle-btn { background: rgba(0,0,0,0.5); border: 1px solid #333; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; }
        .view-toggle-btn:hover { background: #333; }
        .reset-btn { background: rgba(200,0,0,0.6); border: 1px solid #ff4444; color: white; padding: 8px 16px; border-radius: 20px; cursor: pointer; transition: 0.2s; margin-left: 10px;}
        .reset-btn:hover { background: red; }

        .view-section { position: absolute; top: 0; left: 0; right: 0; bottom: 0; overflow-y: auto; padding: 100px 32px 32px 32px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        .view-section.active-view { opacity: 1; pointer-events: auto; }

        #home-view { background: linear-gradient(180deg, var(--dynamic-bg-light) 0%, rgba(18,18,18,1) 300px); }
        
        /* --- List View (Default) --- */
        .track-list-header { display: grid; grid-template-columns: 48px 1fr; padding: 0 16px 8px 16px; border-bottom: 1px solid rgba(255,255,255,0.1); color: var(--text-subdued); font-size: 12px; text-transform: uppercase; margin-bottom: 16px; }
        #song-list-container { display: flex; flex-direction: column; gap: 4px; }
        .song-item { display: grid; grid-template-columns: 48px 1fr; align-items: center; padding: 8px 16px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .song-item:hover { background-color: rgba(255,255,255,0.1); }
        .song-item.active-song .song-title { color: var(--accent); }
        .song-item img { display: none; } 
        .song-info-container { display: flex; align-items: center; gap: 8px; }
        
        /* --- Grid View --- */
        #song-list-container.grid-mode { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 24px; }
        .grid-mode .song-item { display: flex; flex-direction: column; align-items: flex-start; padding: 16px; background: #181818; border-radius: 8px; }
        .grid-mode .song-item:hover { background: #282828; transform: translateY(-4px); }
        .grid-mode .song-item img { display: block; width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 4px; margin-bottom: 16px; background: #333; }
        .grid-mode .song-index, .grid-mode .playing-visualizer { display: none !important; }
        .grid-mode .song-title { font-size: 14px; font-weight: 700; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; width: 100%;}
        
        .playing-visualizer { display: none; width: 14px; height: 14px; justify-content: space-between; align-items: flex-end; margin: 0 auto; }
        .song-item.active-song .playing-visualizer { display: flex; }
        .song-item.active-song .song-index { display: none; }
        .playing-visualizer span { width: 2px; background-color: var(--accent); animation: bounce 0.5s infinite alternate; border-radius: 1px; }
        @keyframes bounce { 0% { height: 2px; } 100% { height: 14px; } }

        .song-index { color: var(--text-subdued); font-size: 14px; text-align: center; }
        .song-title { font-weight: 500; font-size: 16px; margin-bottom: 4px; }
        .song-artist { font-size: 14px; color: var(--text-subdued); }

        .player-bar { grid-column: 1 / 4; grid-row: 2 / 3; background-color: var(--bg-base); border-top: 1px solid #282828; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; z-index: 60; transition: 0.3s ease; }
        .track-info { width: 30%; min-width: 180px; display: flex; align-items: center; gap: 14px; }
        .album-art { width: 56px; height: 56px; border-radius: 4px; background-color: #282828; background-size: cover; background-position: center; }
        .np-text { display: flex; flex-direction: column; justify-content: center; }
        #np-title { font-size: 14px; font-weight: 600; }
        #np-artist { font-size: 12px; color: var(--text-subdued); }

        .player-center { width: 40%; max-width: 722px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .control-buttons { display: flex; align-items: center; gap: 24px; }
        .btn-icon { width: 16px; height: 16px; fill: var(--text-subdued); cursor: pointer; transition: 0.2s; }
        .btn-icon:hover, .btn-icon.active { fill: var(--accent); }
        .play-btn { width: 32px; height: 32px; border-radius: 50%; background-color: var(--text-base); display: flex; justify-content: center; align-items: center; cursor: pointer; }
        .play-btn svg { width: 16px; height: 16px; fill: #000; }
        #pause-icon { display: none; }
        
        .progress-container { width: 100%; display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--text-subdued); }
        .progress-bar-bg { flex: 1; height: 4px; background-color: #4D4D4D; border-radius: 2px; cursor: pointer; }
        .progress-bar-fill { height: 100%; background-color: var(--text-base); border-radius: 2px; width: 0%; pointer-events: none; }

        .volume-controls { width: 30%; min-width: 250px; display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
        .volume-slider { width: 93px; }
        
        audio { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <svg class="sidebar-icon active" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </div>

    <div class="main-container">
        <div class="top-nav">
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C5.91 14 3 11.09 3 9.5S5.91 5 9.5 5 16 7.91 16 9.5 11.09 14 9.5 14z"/></svg>
                <input type="text" id="search-input" class="search-bar" placeholder="Search for a song...">
            </div>
            <div>
                <button id="view-toggle-btn" class="view-toggle-btn">Switch to Grid View</button>
                <button onclick="localStorage.clear(); sessionStorage.clear(); window.location.href=window.location.href.split('?')[0]+'?v='+new Date().getTime();" class="reset-btn">Reset App</button>
            </div>
        </div>

        <div id="home-view" class="view-section active-view">
            <br><br><br>
            <div class="track-list-header" id="list-header"><div style="text-align:center">#</div><div>Title</div></div>
            <div id="song-list-container">Starting up Javascript...</div>
        </div>
    </div>

    <div class="queue-sidebar" id="queue-sidebar">
        <div class="queue-header">Up Next</div>
        <div id="queue-list">Play a song to see the queue.</div>
    </div>

    <div class="player-bar" id="player-bar">
        <div class="track-info">
            <div class="album-art" id="np-art"></div>
            <div class="np-text">
                <div id="np-title">No track selected</div>
                <div id="np-artist"></div> 
            </div>
        </div>
        
        <div class="player-center">
            <div class="control-buttons">
                <svg class="btn-icon" id="prev-btn" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                <div class="play-btn" id="play-pause-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
                <svg class="btn-icon" id="next-btn" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <div class="progress-bar-bg" id="progress-bg"><div class="progress-bar-fill" id="progress-fill"></div></div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="volume-controls">
            <svg class="btn-icon" id="queue-toggle-btn" viewBox="0 0 24 24" title="Up Next Queue"><path d="M3 15h18v-2H3v2zm0 4h18v-2H3v2zm0-8h18V9H3v2zm0-6v2h18V5H3z"/></svg>
            <svg class="btn-icon" id="pip-toggle-btn" viewBox="0 0 24 24" title="Mini Player"><path d="M19 7h-8v6h8V7zm2-4H3c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 16.01H3V4.98h18v14.03z"/></svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.01">
        </div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        // MASTER FAIL-SAFE WRAPPER
        try {
            const listContainer = document.getElementById('song-list-container');
            if(listContainer) listContainer.innerHTML = "Script is running... checking dependencies...";

            if (typeof window.supabase === 'undefined') {
                throw new Error("Supabase library failed to load entirely. The school is blocking jsdelivr.net.");
            }

            const supabaseUrl = 'https://xdebyjfkijaertthzjup.supabase.co';
            const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWJ5amZraWphZXJ0dGh6anVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTU4NjgsImV4cCI6MjA4ODczMTg2OH0.QPPyLb7SbY7ChzwDejlGC9dqqX0nEGiFHND402pqEDo';
            const supabase = window.supabase.createClient(supabaseUrl, anonKey);

            let songList = [];
            let currentSongIndex = -1;
            let isGridView = false;
            const audio = document.getElementById('audio-player') || new Audio();
            
            let colorThief = null;
            if (typeof ColorThief !== 'undefined') {
                colorThief = new ColorThief();
            }

            // SAFELY BIND BUTTONS (Ignores missing buttons if you are using custom UI)
            const viewToggleBtn = document.getElementById('view-toggle-btn');
            if (viewToggleBtn) {
                viewToggleBtn.onclick = () => {
                    isGridView = !isGridView;
                    const container = document.getElementById('song-list-container');
                    const header = document.getElementById('list-header');
                    if(container) container.classList.toggle('grid-mode');
                    if(header) header.style.display = isGridView ? 'none' : 'grid';
                    viewToggleBtn.innerText = isGridView ? "Switch to List View" : "Switch to Grid View";
                };
            }

            const queueToggleBtn = document.getElementById('queue-toggle-btn');
            if (queueToggleBtn) {
                queueToggleBtn.onclick = () => {
                    document.body.classList.toggle('queue-open');
                    queueToggleBtn.classList.toggle('active');
                };
            }

            const pipToggleBtn = document.getElementById('pip-toggle-btn');
            if (pipToggleBtn) {
                pipToggleBtn.onclick = () => {
                    document.body.classList.toggle('mini-player-mode');
                    pipToggleBtn.classList.toggle('active');
                };
            }

            async function fetchSongs() {
                try {
                    const container = document.getElementById('song-list-container');
                    if(container) container.innerHTML = "Talking to Supabase database...";
                    
                    const { data, error } = await supabase.from('songs').select('*');
                    
                    if (error) {
                        if(container) container.innerHTML = `<div style="color:#ff4444; padding:20px;"><b>SUPABASE ERROR:</b> ${error.message || JSON.stringify(error)}</div>`;
                        return;
                    }
                    
                    if (!data || data.length === 0) {
                        if(container) container.innerHTML = `<div style="padding:20px; color:white;"><b>Database connected perfectly</b>, but 0 songs were returned. RLS Policy is still blocking the Anon user.</div>`;
                        return;
                    }
                    
                    songList = data;
                    renderList(songList);

                } catch (err) {
                    const container = document.getElementById('song-list-container');
                    if(container) container.innerHTML = `<div style="color:#ff4444; padding:20px;"><b>NETWORK/FETCH ERROR:</b> ${err.message}</div>`;
                }
            }

            function renderList(list) {
                const container = document.getElementById('song-list-container');
                if (!container) return;
                container.innerHTML = ''; 
                list.forEach((song, i) => {
                    const div = document.createElement('div');
                    div.className = `song-item ${i === currentSongIndex ? 'active-song' : ''}`;
                    div.id = `song-${i}`;
                    div.innerHTML = `
                        <div style="text-align: center; width:100%;">
                            <span class="song-index">${i + 1}</span>
                            <div class="playing-visualizer"><span></span><span></span><span></span><span></span></div>
                        </div>
                        <img src="${song.cover_url || ''}" alt="Cover">
                        <div class="song-info-container">
                            <div>
                                <div class="song-title">${song.title}</div>
                                <div class="song-artist">${song.artist}</div>
                            </div>
                        </div>
                    `;
                    div.onclick = () => playSong(i);
                    container.appendChild(div);
                });
            }

            function renderQueue() {
                const queueList = document.getElementById('queue-list');
                if (!queueList) return;
                queueList.innerHTML = '';
                const nextSongs = songList.slice(currentSongIndex + 1);
                
                if (nextSongs.length === 0) {
                    queueList.innerHTML = '<div style="color:var(--text-subdued); font-size:14px;">End of queue.</div>';
                    return;
                }

                nextSongs.forEach((song) => {
                    const div = document.createElement('div');
                    div.className = 'queue-item';
                    div.innerHTML = `
                        <img src="${song.cover_url || ''}">
                        <div class="queue-item-info">
                            <span class="queue-item-title">${song.title}</span>
                            <span>${song.artist}</span>
                        </div>
                    `;
                    queueList.appendChild(div);
                });
            }

            function playSong(index) {
                document.querySelectorAll('.song-item').forEach(el => el.classList.remove('active-song'));
                currentSongIndex = index;
                const song = songList[index];
                const activeRow = document.getElementById(`song-${index}`);
                if (activeRow) activeRow.classList.add('active-song');
                
                const npTitle = document.getElementById('np-title');
                const npArtist = document.getElementById('np-artist');
                const npArt = document.getElementById('np-art');
                
                if(npTitle) npTitle.innerText = song.title; 
                if(npArtist) npArtist.innerText = song.artist; 
                
                if (song.cover_url && npArt) {
                    npArt.style.backgroundImage = `url('${song.cover_url}')`;
                    if (colorThief) {
                        const img = new Image(); img.crossOrigin = 'Anonymous'; img.src = song.cover_url;
                        img.onload = () => { try {
                            const c = colorThief.getColor(img);
                            document.documentElement.style.setProperty('--dynamic-bg-light', `rgba(${c[0]}, ${c[1]}, ${c[2]}, 0.4)`);
                        } catch(e){} };
                    }
                }

                audio.src = song.audio_url;
                audio.play();
                
                const playIcon = document.getElementById('play-icon');
                const pauseIcon = document.getElementById('pause-icon');
                if(playIcon) playIcon.style.display = 'none';
                if(pauseIcon) pauseIcon.style.display = 'block';
                
                renderQueue();
            }

            const playPauseBtn = document.getElementById('play-pause-btn');
            if(playPauseBtn) {
                playPauseBtn.onclick = () => {
                    if (!audio.src) return;
                    const playIcon = document.getElementById('play-icon');
                    const pauseIcon = document.getElementById('pause-icon');
                    
                    if (audio.paused) { 
                        audio.play(); 
                        if(playIcon) playIcon.style.display = 'none'; 
                        if(pauseIcon) pauseIcon.style.display = 'block'; 
                    } else { 
                        audio.pause(); 
                        if(pauseIcon) pauseIcon.style.display = 'none'; 
                        if(playIcon) playIcon.style.display = 'block'; 
                    }
                };
            }

            function playNext() {
                if (currentSongIndex + 1 < songList.length) playSong(currentSongIndex + 1);
            }
            
            const nextBtn = document.getElementById('next-btn');
            if(nextBtn) nextBtn.onclick = playNext;
            
            const prevBtn = document.getElementById('prev-btn');
            if(prevBtn) {
                prevBtn.onclick = () => {
                    if (audio.currentTime > 3) audio.currentTime = 0; 
                    else if (currentSongIndex > 0) playSong(currentSongIndex - 1);
                };
            }
            
            audio.onended = playNext;

            function formatTime(s) { if(isNaN(s)) return "0:00"; let m = Math.floor(s/60); let secs = Math.floor(s%60); return m+":"+(secs<10?"0"+secs:secs); }

            audio.ontimeupdate = () => {
                if (!audio.duration) return;
                const fill = document.getElementById('progress-fill');
                const currTime = document.getElementById('time-current');
                if(fill) fill.style.width = ((audio.currentTime / audio.duration) * 100) + '%';
                if(currTime) currTime.innerText = formatTime(audio.currentTime);
            };

            const progressBg = document.getElementById('progress-bg');
            if(progressBg) {
                progressBg.onclick = (e) => {
                    if (!audio.duration) return;
                    const rect = progressBg.getBoundingClientRect();
                    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
                };
            }

            const volSlider = document.getElementById('volume-slider');
            if(volSlider) {
                volSlider.addEventListener('input', (e) => { audio.volume = e.target.value; });
            }

            audio.onloadedmetadata = () => {
                const totalTime = document.getElementById('time-total');
                if(totalTime) totalTime.innerText = formatTime(audio.duration);
            }

            // Kick off the load
            fetchSongs();

        } catch (masterError) {
            const container = document.getElementById('song-list-container');
            if(container) {
                container.innerHTML = `<div style="color:#ff4444; padding:20px;"><b>FATAL JAVASCRIPT CRASH:</b><br><br>${masterError.message}</div>`;
            } else {
                console.error("Crash:", masterError.message);
            }
        }
    </script>
</body>
</html>
