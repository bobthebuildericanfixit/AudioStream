<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioStream</title>
    
    <style>
        :root {
            --bg-main: #121316;
            --bg-sidebar: #0a0b0d;
            --bg-player: #121316;
            --bg-card: #1e1f24;
            --accent-green: #1ed760;
            --text-main: #ffffff;
            --text-sub: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            height: 100vh;
            display: grid;
            grid-template-columns: 70px 1fr;
            grid-template-rows: 1fr 90px;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            background-color: var(--bg-sidebar);
            grid-column: 1 / 2;
            grid-row: 1 / 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
            gap: 25px;
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        .sidebar-icon {
            width: 24px;
            height: 24px;
            fill: var(--text-sub);
            cursor: pointer;
            transition: 0.2s;
        }
        .sidebar-icon:hover { fill: var(--text-main); }
        .sidebar-icon.active { fill: var(--accent-green); }

        /* --- MAIN CONTENT --- */
        .main-view {
            grid-column: 2 / 3;
            grid-row: 1 / 2;
            overflow-y: auto;
            position: relative;
            background: radial-gradient(circle at 50% -20%, rgba(30, 100, 70, 0.4) 0%, var(--bg-main) 60%);
            padding: 20px 40px;
        }

        /* Top Nav */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 40px;
        }
        
        /* Custom Search Bar with embedded SVG */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }
        .search-icon {
            position: absolute;
            left: 15px;
            width: 18px;
            height: 18px;
            fill: var(--text-sub);
        }
        .search-bar {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid transparent;
            padding: 10px 20px 10px 40px;
            border-radius: 20px;
            color: white;
            width: 300px;
            outline: none;
            transition: 0.2s;
        }
        .search-bar:focus {
            border: 1px solid rgba(255, 255, 255, 0.2);
            background-color: rgba(255, 255, 255, 0.1);
        }

        /* Hero Section */
        .hero {
            text-align: center;
            margin-bottom: 40px;
        }
        .hero h1 {
            font-size: 42px;
            margin: 0 0 10px 0;
            font-weight: 700;
            letter-spacing: 1px;
        }
        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background-color: rgba(255,255,255,0.1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--text-sub);
        }
        .sparkle-icon {
            width: 14px;
            height: 14px;
            fill: var(--text-sub);
        }

        /* Pills */
        .section-title {
            font-size: 18px;
            margin-bottom: 15px;
            font-weight: 600;
        }
        .pills-container {
            display: flex;
            gap: 15px;
            margin-bottom: 40px;
        }
        .pill {
            flex: 1;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;
            cursor: pointer;
            background: linear-gradient(45deg, #2a2a2a, #3a3a3a);
        }
        .pill.pop { background: linear-gradient(45deg, #1e4d2b, #2e7d32); }
        .pill.country { background: linear-gradient(45deg, #8d4004, #d84315); }
        .pill.hiphop { background: linear-gradient(45deg, #4a148c, #7b1fa2); }

        /* Database Tracks Section */
        .db-tracks {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 30px;
        }
        .song-item {
            display: grid;
            grid-template-columns: 40px 1fr 50px;
            align-items: center;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.2s;
        }
        .song-item:hover { background-color: rgba(255,255,255,0.05); }
        .song-title { font-weight: bold; font-size: 15px; color: var(--text-main); }
        .song-artist { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
        .play-indicator { fill: var(--accent-green); opacity: 0; width: 16px; height: 16px; }
        .song-item:hover .play-indicator { opacity: 1; }

        /* --- BOTTOM PLAYER --- */
        .player-bar {
            grid-column: 1 / 3;
            grid-row: 2 / 3;
            background-color: var(--bg-player);
            border-top: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .track-info {
            width: 30%;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .album-art {
            width: 50px;
            height: 50px;
            background-color: #333;
            border-radius: 6px;
        }
        #np-title { font-size: 14px; font-weight: bold; }
        #np-artist { font-size: 12px; color: var(--text-sub); }

        .player-controls {
            width: 40%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .control-buttons {
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .btn-icon {
            width: 16px; height: 16px;
            fill: var(--text-sub);
            cursor: pointer;
        }
        .btn-icon:hover { fill: var(--text-main); }
        .play-btn {
            width: 32px; height: 32px;
            background-color: var(--text-main);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer;
        }
        .play-btn svg { width: 16px; height: 16px; fill: black; margin-left: 2px; }
        
        /* Custom Progress Bar */
        .progress-container {
            width: 100%;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 11px;
            color: var(--text-sub);
        }
        .progress-bar-bg {
            flex: 1;
            height: 4px;
            background-color: rgba(255,255,255,0.1);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress-bar-fill {
            height: 100%;
            background-color: var(--accent-green);
            border-radius: 2px;
            width: 0%;
        }

        .volume-controls { width: 30%; }
        
        audio { display: none; }
    </style>
</head>
<body>

    <div class="sidebar">
        <svg class="sidebar-icon active" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10" fill="#1ed760"/><path d="M8 12a4 4 0 0 1 8 0" stroke="black" stroke-width="2" fill="none"/></svg>
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
        <svg class="sidebar-icon" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"/></svg>
    </div>

    <div class="main-view">
        <div class="top-nav">
            <div style="font-size: 12px; color: var(--text-sub);">Artists > Top 2024</div>
            
            <div class="search-container">
                <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C5.91 14 3 11.09 3 9.5S5.91 5 9.5 5 16 7.91 16 9.5 11.09 14 9.5 14z"/></svg>
                <input type="text" class="search-bar" placeholder="What do you want to listen to?">
            </div>

            <div style="display: flex; gap: 15px; align-items: center;">
                <div style="width:30px; height:30px; background:#444; border-radius:50%;"></div>
            </div>
        </div>

        <div class="hero">
            <h1>Discover</h1>
            <div class="hero-badge">
                <svg class="sparkle-icon" viewBox="0 0 24 24"><path d="M12 2l2.4 7.6L22 12l-7.6 2.4L12 22l-2.4-7.6L2 12l7.6-2.4L12 2z"/></svg>
                made for you
            </div>
        </div>

        <div class="section-title">Explore</div>
        <div class="pills-container">
            <div class="pill pop">Pop</div>
            <div class="pill country">Country</div>
            <div class="pill hiphop">Hip-Hop</div>
            <div class="pill" style="background: linear-gradient(45deg, #004d40, #00796b);">Rock</div>
            <div class="pill" style="background: linear-gradient(45deg, #263238, #455a64);">Indie</div>
        </div>

        <div class="section-title">Your Tracks</div>
        <div class="db-tracks" id="song-list">
            <div style="color: var(--text-sub);">Loading database...</div>
        </div>
    </div>

    <div class="player-bar">
        <div class="track-info">
            <div class="album-art" id="np-art"></div>
            <div>
                <div id="np-title">Select a track</div>
                <div id="np-artist">-</div>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="control-buttons">
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
                <div class="play-btn" id="play-pause-btn">
                    <svg id="play-icon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                    <svg id="pause-icon" viewBox="0 0 24 24" style="display: none; margin-left: 0;"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
                </div>
                <svg class="btn-icon" viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
            </div>
            <div class="progress-container">
                <span id="time-current">0:00</span>
                <div class="progress-bar-bg" id="progress-bg">
                    <div class="progress-bar-fill" id="progress-fill"></div>
                </div>
                <span id="time-total">0:00</span>
            </div>
        </div>

        <div class="volume-controls"></div>
    </div>

    <audio id="audio-player"></audio>

    <script>
        const apiUrl = 'https://xdebyjfkijaertthzjup.supabase.co/rest/v1/songs?select=*';
        const anonKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWJ5amZraWphZXJ0dGh6anVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTU4NjgsImV4cCI6MjA4ODczMTg2OH0.QPPyLb7SbY7ChzwDejlGC9dqqX0nEGiFHND402pqEDo';
        
        const audio = document.getElementById('audio-player');
        const playPauseBtn = document.getElementById('play-pause-btn');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const progressFill = document.getElementById('progress-fill');
        const timeCurrent = document.getElementById('time-current');
        const npTitle = document.getElementById('np-title');
        const npArtist = document.getElementById('np-artist');

        async function fetchSongs() {
            try {
                const response = await fetch(apiUrl, {
                    method: 'GET',
                    headers: { 'apikey': anonKey, 'Authorization': `Bearer ${anonKey}` }
                });

                if (!response.ok) return;

                const data = await response.json();
                const songListDiv = document.getElementById('song-list');
                
                if (data.length === 0) {
                    songListDiv.innerHTML = '<div style="color:#ff4444;">No tracks found.</div>';
                    return;
                }

                songListDiv.innerHTML = ''; 

                data.forEach(song => {
                    const songItem = document.createElement('div');
                    songItem.className = 'song-item';
                    songItem.innerHTML = `
                        <svg class="play-indicator" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                        <div>
                            <div class="song-title">${song.title}</div>
                            <div class="song-artist">${song.artist}</div>
                        </div>
                        <div style="color: var(--text-sub); font-size: 12px;">3:45</div>
                    `;
                    
                    songItem.onclick = () => {
                        audio.src = song.audio_url;      
                        audio.play();                    
                        npTitle.innerText = song.title; 
                        npArtist.innerText = song.artist; 
                        
                        playIcon.style.display = 'none';
                        pauseIcon.style.display = 'block';
                    };
                    
                    songListDiv.appendChild(songItem);
                });
            } catch (err) {
                console.error(err);
            }
        }

        playPauseBtn.onclick = () => {
            if (!audio.src) return; 
            
            if (audio.paused) {
                audio.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            } else {
                audio.pause();
                pauseIcon.style.display = 'none';
                playIcon.style.display = 'block';
            }
        };

        audio.ontimeupdate = () => {
            if (!audio.duration) return;
            
            const percent = (audio.currentTime / audio.duration) * 100;
            progressFill.style.width = percent + '%';

            let currentMins = Math.floor(audio.currentTime / 60);
            let currentSecs = Math.floor(audio.currentTime - currentMins * 60);
            if (currentSecs < 10) currentSecs = "0" + currentSecs;
            timeCurrent.innerText = currentMins + ":" + currentSecs;
        };

        fetchSongs();
    </script>
</body>
</html>
