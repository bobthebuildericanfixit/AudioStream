<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AudioStream</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            justify-content: center;
            padding-top: 50px;
            margin: 0;
        }
        .player-container {
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 12px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        h1 { margin-top: 0; font-size: 24px; }
        #now-playing {
            color: #1db954; 
            font-weight: bold;
            margin-bottom: 15px;
            font-size: 14px;
        }
        audio {
            width: 100%;
            margin-bottom: 20px;
            outline: none;
        }
        .playlist {
            margin-top: 10px;
            border-top: 1px solid #333;
            padding-top: 10px;
        }
        .song-item {
            padding: 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: background-color 0.2s;
            font-size: 15px;
        }
        .song-item:hover { background-color: #2a2a2a; }
        .song-artist {
            font-size: 12px;
            color: #b3b3b3;
            margin-top: 4px;
        }
        .error-text {
            color: #ff4444;
            background: #2a0000;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="player-container">
        <h1>AudioStream</h1>
        <div id="now-playing">Select a track from the playlist</div>
        
        <audio id="audio-player" controls>
            Your browser does not support the audio element.
        </audio>

        <h3>Your Playlist</h3>
        <div class="playlist" id="song-list">
            Loading your tracks...
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://xdebyjfkijaertthzjup.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhkZWJ5amZraWphZXJ0dGh6anVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxNTU4NjgsImV4cCI6MjA4ODczMTg2OH0.QPPyLb7SbY7ChzwDejlGC9dqqX0nEGiFHND402pqEDo';
        
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const audioPlayer = document.getElementById('audio-player');
        const nowPlayingText = document.getElementById('now-playing');
        const songListDiv = document.getElementById('song-list');

        async function fetchSongs() {
            try {
                const { data, error } = await supabase
                    .from('songs')
                    .select('*');

                // IF SUPABASE REJECTS THE REQUEST, PRINT IT ON SCREEN
                if (error) {
                    songListDiv.innerHTML = `
                        <div class="error-text">
                            <strong>Supabase Error:</strong><br> ${error.message}
                            <br><br><em>(Hint: If this says anything about policies or security, you need to turn off Row Level Security (RLS) for your 'songs' table in the Supabase Dashboard!)</em>
                        </div>`;
                    return;
                }

                // IF DATABASE IS EMPTY
                if (!data || data.length === 0) {
                    songListDiv.innerHTML = '<div class="error-text">No songs found in the database. Did you add rows to your "songs" table?</div>';
                    return;
                }

                // IF EVERYTHING WORKS, RENDER THE SONGS
                songListDiv.innerHTML = ''; 
                
                data.forEach(song => {
                    const songItem = document.createElement('div');
                    songItem.className = 'song-item';
                    songItem.innerHTML = `
                        <div><strong>${song.title}</strong></div>
                        <div class="song-artist">${song.artist}</div>
                    `;
                    
                    songItem.onclick = () => {
                        audioPlayer.src = song.audio_url;      
                        audioPlayer.play();                    
                        nowPlayingText.innerText = `Now Playing: ${song.title}`; 
                    };
                    
                    songListDiv.appendChild(songItem);
                });

            } catch (err) {
                // IF THE CODE CRASHES ENTIRELY
                songListDiv.innerHTML = `<div class="error-text"><strong>Critical Error:</strong> ${err.message}</div>`;
            }
        }

        fetchSongs();
    </script>
</body>
</html>
